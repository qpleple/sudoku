<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ Number Fun!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-1: #FF6B9D;
            --color-2: #FFA07A;
            --color-3: #98D8C8;
            --color-4: #A7C7E7;
            --bg-main: #FFF5E1;
            --bg-pattern: #FFE8CC;
            --shadow-soft: 0 8px 0 rgba(0,0,0,0.1);
            --shadow-lifted: 0 12px 24px rgba(0,0,0,0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Fredoka', 'Comic Sans MS', cursive;
            background: var(--bg-main);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255,182,193,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(173,216,230,0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(152,216,200,0.2) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Floating decorative shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            pointer-events: none;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            background: var(--color-1);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 60px;
            height: 60px;
            background: var(--color-3);
            top: 70%;
            right: 15%;
            animation-delay: -5s;
        }

        .shape:nth-child(3) {
            width: 100px;
            height: 100px;
            background: var(--color-4);
            bottom: 20%;
            left: 15%;
            animation-delay: -10s;
        }

        .shape:nth-child(4) {
            width: 70px;
            height: 70px;
            background: var(--color-2);
            top: 40%;
            right: 10%;
            animation-delay: -15s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -20px) rotate(5deg); }
            50% { transform: translate(-10px, 10px) rotate(-5deg); }
            75% { transform: translate(10px, 20px) rotate(3deg); }
        }

        .container {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: clamp(32px, 10vw, 48px);
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-1) 0%, var(--color-2) 50%, var(--color-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-size: clamp(16px, 4vw, 20px);
            color: #666;
            font-weight: 400;
        }

        .message {
            text-align: center;
            font-size: clamp(20px, 5vw, 26px);
            font-weight: 600;
            margin-bottom: 20px;
            min-height: 36px;
            color: #FF6B9D;
            animation: messagePop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes messagePop {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .grid-container {
            background: white;
            padding: 16px;
            border-radius: 32px;
            box-shadow:
                0 20px 40px rgba(0,0,0,0.12),
                inset 0 -2px 0 rgba(0,0,0,0.05);
            margin-bottom: 24px;
            animation: gridAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }

        @keyframes gridAppear {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: transparent;
        }

        .cell {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            border: none;
            font-size: clamp(28px, 8vw, 44px);
            font-weight: 700;
            color: #333;
            cursor: pointer;
            border-radius: 16px;
            box-shadow:
                0 6px 0 rgba(0,0,0,0.08),
                0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .cell::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(145deg, rgba(255,255,255,0.8), transparent);
            pointer-events: none;
        }

        .cell:not(.fixed):active {
            transform: translateY(4px);
            box-shadow:
                0 2px 0 rgba(0,0,0,0.08),
                0 1px 4px rgba(0,0,0,0.06);
        }

        .cell.fixed {
            background: linear-gradient(145deg, #E8F4F8, #D5E9F0);
            color: #5A8BA5;
            cursor: default;
            box-shadow:
                inset 0 2px 8px rgba(0,0,0,0.06),
                0 2px 4px rgba(0,0,0,0.04);
        }

        .cell.selected {
            background: linear-gradient(145deg, #FFF9E6, #FFF3D6);
            box-shadow:
                0 0 0 4px #FFD93D,
                0 6px 0 rgba(0,0,0,0.08);
            animation: cellPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cellPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .cell.error {
            animation: errorShake 0.4s;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-8px) rotate(-2deg); }
            75% { transform: translateX(8px) rotate(2deg); }
        }

        .cell.correct-pop {
            animation: correctPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes correctPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Block dividers for 2x2 sections */
        .cell:nth-child(5),
        .cell:nth-child(6),
        .cell:nth-child(7),
        .cell:nth-child(8) {
            margin-top: 8px;
        }

        .cell:nth-child(4n+3),
        .cell:nth-child(4n+4) {
            margin-left: 8px;
        }

        .number-pad {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
            animation: padSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
        }

        @keyframes padSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .number-btn {
            aspect-ratio: 2;
            font-size: clamp(32px, 9vw, 48px);
            font-weight: 700;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .number-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, rgba(255,255,255,0.3), transparent 50%);
            pointer-events: none;
        }

        .number-btn::after {
            content: attr(data-number);
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .number-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        .number-btn:active::after {
            transform: scale(0.95);
        }

        .number-btn[data-number="1"] {
            background: linear-gradient(145deg, var(--color-1), #FF5580);
        }

        .number-btn[data-number="2"] {
            background: linear-gradient(145deg, var(--color-2), #FF8A5B);
        }

        .number-btn[data-number="3"] {
            background: linear-gradient(145deg, var(--color-3), #7BC4B4);
        }

        .number-btn[data-number="4"] {
            background: linear-gradient(145deg, var(--color-4), #89AED5);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            animation: controlsSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s both;
        }

        @keyframes controlsSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .control-btn {
            padding: 18px;
            font-size: clamp(18px, 4.5vw, 22px);
            font-weight: 600;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: white;
            color: #666;
            box-shadow:
                0 6px 0 rgba(0,0,0,0.06),
                0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .control-btn:active {
            transform: translateY(4px);
            box-shadow:
                0 2px 0 rgba(0,0,0,0.06),
                0 1px 4px rgba(0,0,0,0.04);
        }

        /* Win celebration */
        .celebration {
            font-size: clamp(40px, 12vw, 64px);
            animation: celebrationBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
        }

        @keyframes celebrationBounce {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.2) rotate(5deg); }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: confettiFall 2s ease-out forwards;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>

    <div class="container">
        <div class="header">
            <h1>✨ Number Fun! ✨</h1>
            <div class="subtitle">Find the missing numbers!</div>
        </div>

        <div class="message" id="message"></div>

        <div class="grid-container">
            <div class="sudoku-grid" id="grid"></div>
        </div>

        <div class="number-pad" id="numberPad"></div>

        <div class="controls">
            <button class="control-btn" onclick="clearCell()">🗑️ Clear</button>
            <button class="control-btn" onclick="newGame()">🎲 New Game</button>
        </div>
    </div>

    <script>
        let selectedCell = null;
        let puzzle = [];
        let solution = [];
        let userInput = [];

        // Initialize
        newGame();

        function newGame() {
            document.getElementById('message').innerHTML = '';
            generatePuzzle();
            renderGrid();
            renderNumberPad();
        }

        function generatePuzzle() {
            solution = generateSolution();
            puzzle = solution.map(row => [...row]);
            userInput = puzzle.map(row => [...row]);

            const cellsToRemove = 6;
            let removed = 0;

            while (removed < cellsToRemove) {
                const row = Math.floor(Math.random() * 4);
                const col = Math.floor(Math.random() * 4);

                if (puzzle[row][col] !== 0) {
                    puzzle[row][col] = 0;
                    userInput[row][col] = 0;
                    removed++;
                }
            }
        }

        function generateSolution() {
            const grid = Array(4).fill(0).map(() => Array(4).fill(0));

            function isValid(grid, row, col, num) {
                for (let x = 0; x < 4; x++) {
                    if (grid[row][x] === num) return false;
                }

                for (let x = 0; x < 4; x++) {
                    if (grid[x][col] === num) return false;
                }

                const boxRow = Math.floor(row / 2) * 2;
                const boxCol = Math.floor(col / 2) * 2;
                for (let i = 0; i < 2; i++) {
                    for (let j = 0; j < 2; j++) {
                        if (grid[boxRow + i][boxCol + j] === num) return false;
                    }
                }

                return true;
            }

            function solve(grid) {
                for (let row = 0; row < 4; row++) {
                    for (let col = 0; col < 4; col++) {
                        if (grid[row][col] === 0) {
                            const numbers = [1, 2, 3, 4].sort(() => Math.random() - 0.5);
                            for (let num of numbers) {
                                if (isValid(grid, row, col, num)) {
                                    grid[row][col] = num;
                                    if (solve(grid)) return true;
                                    grid[row][col] = 0;
                                }
                            }
                            return false;
                        }
                    }
                }
                return true;
            }

            solve(grid);
            return grid;
        }

        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';

            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 4; col++) {
                    const cell = document.createElement('button');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;

                    if (puzzle[row][col] !== 0) {
                        cell.textContent = puzzle[row][col];
                        cell.classList.add('fixed');
                    } else {
                        cell.textContent = userInput[row][col] || '';
                        cell.onclick = () => selectCell(row, col);
                    }

                    gridEl.appendChild(cell);
                }
            }
        }

        function renderNumberPad() {
            const padEl = document.getElementById('numberPad');
            padEl.innerHTML = '';

            for (let i = 1; i <= 4; i++) {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.dataset.number = i;
                btn.textContent = i;
                btn.onclick = () => placeNumber(i);
                padEl.appendChild(btn);
            }
        }

        function selectCell(row, col) {
            if (puzzle[row][col] !== 0) return;

            selectedCell = { row, col };
            updateCellHighlights();
        }

        function updateCellHighlights() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, idx) => {
                const row = Math.floor(idx / 4);
                const col = idx % 4;

                cell.classList.remove('selected', 'error');

                if (selectedCell && selectedCell.row === row && selectedCell.col === col) {
                    cell.classList.add('selected');
                }
            });
        }

        function placeNumber(num) {
            if (!selectedCell) {
                showMessage('👆 Pick a square first!');
                return;
            }

            const { row, col } = selectedCell;

            if (puzzle[row][col] !== 0) return;

            userInput[row][col] = num;

            if (num === solution[row][col]) {
                const cells = document.querySelectorAll('.cell');
                const idx = row * 4 + col;
                cells[idx].classList.add('correct-pop');

                setTimeout(() => {
                    renderGrid();
                    checkWin();
                }, 300);
            } else {
                const cells = document.querySelectorAll('.cell');
                const idx = row * 4 + col;
                cells[idx].classList.add('error');
                cells[idx].textContent = num;

                setTimeout(() => {
                    userInput[row][col] = 0;
                    renderGrid();
                    selectCell(row, col);
                }, 500);
            }
        }

        function clearCell() {
            if (!selectedCell) {
                showMessage('👆 Pick a square first!');
                return;
            }

            const { row, col } = selectedCell;
            if (puzzle[row][col] === 0) {
                userInput[row][col] = 0;
                renderGrid();
                selectCell(row, col);
            }
        }

        function showMessage(msg) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = msg;
            setTimeout(() => msgEl.textContent = '', 2000);
        }

        function checkWin() {
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 4; col++) {
                    if (userInput[row][col] !== solution[row][col]) {
                        return;
                    }
                }
            }

            selectedCell = null;
            document.getElementById('message').innerHTML = '<div class="celebration">🎉 You Did It! 🌟</div>';
            createConfetti();
            updateCellHighlights();
        }

        function createConfetti() {
            const colors = ['#FF6B9D', '#FFA07A', '#98D8C8', '#A7C7E7', '#FFD93D', '#B19CD9'];

            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    confetti.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        // Touch handling
        document.addEventListener('touchstart', function(e) {
            if (e.target.classList.contains('cell') ||
                e.target.classList.contains('number-btn') ||
                e.target.classList.contains('control-btn')) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
