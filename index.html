<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Sudoku</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👶</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>

    <div class="container">
        <div class="header">
            <h1>Baby Sudoku</h1>
        </div>

        <div class="message" id="message"></div>

        <div class="grid-container">
            <div class="sudoku-grid" id="grid"></div>
        </div>

        <div class="number-pad" id="numberPad"></div>

        <div class="controls">
            <button class="control-btn" onclick="clearCell()">🗑️ Clear</button>
            <button class="control-btn" onclick="newGame()">🎲 New Game</button>
            <button class="control-btn" id="muteBtn" onclick="toggleMute()">🔊 Sound</button>
        </div>
    </div>

    <script src="game.js?v=1"></script>
</body>
</html>
